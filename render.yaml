services:
  - type: web
    name: breathe-esg
    runtime: python
    buildCommand: bash build.sh
    startCommand: cd backend && gunicorn breathe_esg.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    rootDir: .
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.0"
